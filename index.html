<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fireside Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #1a1a2e; font-size: 14px; }

  /* Nav */
  .nav { background: #fff; border-bottom: 1px solid #e0e0e0; display: flex; align-items: center; padding: 0 24px; height: 52px; gap: 0; position: sticky; top: 0; z-index: 100; }
  .nav-logo { font-weight: 700; font-size: 16px; color: #c0392b; margin-right: 32px; letter-spacing: .5px; }
  .nav-tab { padding: 0 18px; height: 52px; display: flex; align-items: center; cursor: pointer; font-weight: 500; color: #666; border-bottom: 3px solid transparent; transition: all .15s; font-size: 14px; }
  .nav-tab:hover { color: #333; }
  .nav-tab.active { color: #c0392b; border-bottom-color: #c0392b; }

  /* Pages */
  .page { display: none; padding: 24px; max-width: 1300px; margin: 0 auto; }
  .page.active { display: block; }

  /* Cards */
  .card { background: #fff; border-radius: 10px; padding: 20px 24px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
  .card-title { font-size: 11px; font-weight: 700; letter-spacing: 1.2px; color: #999; text-transform: uppercase; margin-bottom: 16px; }

  /* Task form */
  .task-form { display: grid; grid-template-columns: 1fr 1.4fr 1fr 1fr 180px auto; gap: 10px; align-items: start; }
  .task-form .hint { grid-column: 1/-1; font-size: 12px; color: #aaa; margin-top: -4px; }
  .form-field { display: flex; flex-direction: column; gap: 4px; }
  .form-field label { font-size: 11px; color: #888; font-weight: 500; }
  .form-field input, .form-field select { border: 1px solid #ddd; border-radius: 6px; padding: 8px 10px; font-size: 13px; color: #333; outline: none; transition: border .15s; background: #fff; width: 100%; }
  .form-field input:focus, .form-field select:focus { border-color: #3b82f6; }
  .form-field input::placeholder { color: #bbb; }
  .btn-add { background: #3b82f6; color: #fff; border: none; border-radius: 6px; padding: 8px 18px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; align-self: flex-end; height: 36px; }
  .btn-add:hover { background: #2563eb; }

  /* Filters */
  .filters { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
  .filters .form-field { min-width: 130px; }
  .btn-clear { background: none; border: 1px solid #ddd; border-radius: 6px; padding: 7px 14px; font-size: 13px; cursor: pointer; color: #555; align-self: flex-end; font-weight: 600; }
  .btn-clear:hover { background: #f5f5f5; }

  /* Tasks table */
  .tasks-table { width: 100%; border-collapse: collapse; }
  .tasks-table th { text-align: left; font-size: 11px; font-weight: 700; letter-spacing: 1px; color: #aaa; text-transform: uppercase; padding: 0 12px 10px; border-bottom: 1px solid #eee; }
  .tasks-table th:first-child { width: 36px; }
  .tasks-table td { padding: 12px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
  .tasks-table tr:last-child td { border-bottom: none; }
  .tasks-table tr.completed td { opacity: .45; text-decoration: line-through; }
  .task-cb { width: 18px; height: 18px; cursor: pointer; accent-color: #3b82f6; }
  .job-badge { display: inline-block; background: #e8f0fe; color: #3b5998; border-radius: 12px; padding: 2px 10px; font-size: 12px; font-weight: 600; white-space: nowrap; }
  .job-badge.ember { background: #fce8e8; color: #c0392b; }
  .col-due { font-size: 13px; }
  .col-due.overdue { color: #e53e3e; font-weight: 600; }
  .col-added { font-size: 12px; color: #aaa; }
  .col-completed { font-size: 12px; color: #aaa; }
  .btn-delete { background: none; border: none; cursor: pointer; color: #ccc; font-size: 16px; line-height: 1; padding: 4px; }
  .btn-delete:hover { color: #e53e3e; }
  .empty-state { text-align: center; color: #bbb; padding: 40px 0; font-size: 13px; }

  /* Trades page – simple list */
  .trade-list-wrap { display: flex; flex-direction: column; gap: 6px; }
  .trade-row { background: #fff; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.06); overflow: hidden; }
  .trade-row-header { display: flex; align-items: center; gap: 12px; padding: 13px 18px; cursor: pointer; user-select: none; }
  .trade-row-header:hover { background: #fafafa; }
  .trade-row-name { font-weight: 700; font-size: 14px; color: #e87c2f; flex: 1; }
  .trade-row-count { font-size: 12px; color: #aaa; }
  .trade-row-chevron { font-size: 12px; color: #bbb; transition: transform .15s; }
  .trade-row.open .trade-row-chevron { transform: rotate(90deg); }
  .trade-row-body { display: none; border-top: 1px solid #f5f5f5; padding: 10px 18px 14px; }
  .trade-row.open .trade-row-body { display: block; }
  .trade-item { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid #f5f5f5; font-size: 13px; }
  .trade-item:last-child { border-bottom: none; }
  .trade-item input[type=checkbox] { accent-color: #e87c2f; width: 16px; height: 16px; flex-shrink: 0; }
  .trade-item-text { flex: 1; }
  .trade-item-text.done { text-decoration: line-through; color: #bbb; }
  .trade-item-del { background: none; border: none; color: #ddd; cursor: pointer; font-size: 15px; padding: 0 4px; }
  .trade-item-del:hover { color: #e53e3e; }
  .trade-add-row { display: flex; gap: 8px; margin-top: 10px; }
  .trade-add-input { flex: 1; border: 1px solid #e0e0e0; border-radius: 6px; padding: 7px 10px; font-size: 13px; outline: none; }
  .trade-add-input:focus { border-color: #e87c2f; }
  .trade-add-btn { background: #e87c2f; color: #fff; border: none; border-radius: 6px; padding: 7px 14px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .trade-add-btn:hover { background: #d06a20; }
  .trade-job-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .trade-job-bar label { font-size: 13px; color: #666; font-weight: 600; }
  .trade-job-bar select { border: 1px solid #ddd; border-radius: 6px; padding: 7px 12px; font-size: 13px; outline: none; }

  /* Contacts page */
  .contacts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
  .contact-card { background: #fff; border-radius: 10px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.07); display: flex; flex-direction: column; gap: 4px; }
  .contact-name { font-weight: 700; font-size: 15px; }
  .contact-role { font-size: 12px; color: #888; }
  .contact-detail { font-size: 12px; color: #555; }
  .contacts-add-form { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 20px; }
  .btn-sm { background: #3b82f6; color: #fff; border: none; border-radius: 6px; padding: 7px 14px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-sm:hover { background: #2563eb; }
  .btn-sm.danger { background: #e53e3e; }
  .btn-sm.danger:hover { background: #c0392b; }
  .contact-actions { display: flex; gap: 6px; margin-top: 8px; }
  .tag { display: inline-block; background: #f0f2f5; border-radius: 10px; padding: 1px 8px; font-size: 11px; color: #666; }
  .tag.designer { background: #e8f0fe; color: #3b5998; }
  .tag.client { background: #fce8e8; color: #c0392b; }
  .tag.vendor { background: #e6f9f0; color: #1a7a4a; }

  /* Multi-select status dropdown */
  .ms-wrap { position: relative; }
  .ms-trigger { border: 1px solid #ddd; border-radius: 6px; padding: 8px 10px; font-size: 13px; color: #333; background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 6px; user-select: none; min-width: 130px; }
  .ms-trigger:hover { border-color: #bbb; }
  .ms-panel { position: absolute; top: calc(100% + 4px); left: 0; background: #fff; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 4px 14px rgba(0,0,0,.13); z-index: 300; min-width: 170px; padding: 5px 0; }
  .ms-panel label { display: flex; align-items: center; gap: 8px; padding: 8px 14px; cursor: pointer; font-size: 13px; color: #333; }
  .ms-panel label:hover { background: #f5f5f5; }
  .ms-panel input[type=checkbox] { accent-color: #3b82f6; flex-shrink:0; }
  .sdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; display:inline-block; }
  .sdot-open   { background: #888; }
  .sdot-inprog { background: #e65100; }
  .sdot-done   { background: #2e7d32; }

  /* Job tags in form */
  .job-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; min-height: 0; }
  .job-tag { display: inline-flex; align-items: center; gap: 4px; background: #e8f0fe; color: #3b5998; border-radius: 10px; padding: 2px 8px 2px 10px; font-size: 12px; font-weight: 600; }
  .job-tag.ember { background: #fce8e8; color: #c0392b; }
  .job-tag-x { background: none; border: none; cursor: pointer; color: inherit; font-size: 14px; padding: 0; line-height: 1; opacity: .6; }
  .job-tag-x:hover { opacity: 1; }

  @media (max-width: 700px) {
    .task-form { grid-template-columns: 1fr 1fr; }
    .task-form .btn-add { grid-column: 1/-1; }
  }
</style>
</head>
<body>

<div class="nav">
  <div class="nav-logo">🔥 Fireside</div>
  <div class="nav-tab active" onclick="showPage('tasks')">Tasks</div>
  <div class="nav-tab" onclick="showPage('trades')">Trades</div>
  <div class="nav-tab" onclick="showPage('contacts')">Contacts</div>
</div>

<!-- TASKS PAGE -->
<div class="page active" id="page-tasks">
  <div class="card">
    <div class="card-title">Add a Task</div>
    <div class="task-form">
      <div class="form-field">
        <label>Job</label>
        <input list="job-list" id="tf-job" placeholder="Pick or type ID, comma or Enter to add more" autocomplete="off" onchange="addJobTag()" onkeydown="handleJobKeydown(event)">
        <datalist id="job-list"></datalist>
        <div class="job-tags" id="job-tags-form"></div>
      </div>
      <div class="form-field">
        <label>Task</label>
        <input type="text" id="tf-task" placeholder="What needs doing...">
      </div>
      <div class="form-field">
        <label>Contact</label>
        <input list="contact-list" id="tf-contact" placeholder="Type or pick..." autocomplete="off">
        <datalist id="contact-list"></datalist>
      </div>
      <div class="form-field">
        <label>Trade</label>
        <input list="trade-list" id="tf-trade" placeholder="Type or pick..." autocomplete="off">
        <datalist id="trade-list"></datalist>
      </div>
      <div class="form-field">
        <label>Due date</label>
        <input type="date" id="tf-due">
      </div>
      <button class="btn-add" onclick="addTask()">+ Add</button>
    </div>
    <div class="hint">All fields optional. Press Enter in any box to add. Date &amp; time added is recorded automatically.</div>
  </div>

  <div class="card">
    <div class="card-title">Filter &amp; Sort</div>
    <div class="filters">
      <div class="form-field">
        <label>Status</label>
        <div style="display:flex;gap:10px;flex-wrap:wrap;padding-top:4px">
          <label style="display:flex;align-items:center;gap:5px;font-size:13px;cursor:pointer"><input type="checkbox" id="fs-open" checked onchange="renderTasks()"> Open</label>
          <label style="display:flex;align-items:center;gap:5px;font-size:13px;cursor:pointer"><input type="checkbox" id="fs-inprog" checked onchange="renderTasks()"> In Progress</label>
          <label style="display:flex;align-items:center;gap:5px;font-size:13px;cursor:pointer"><input type="checkbox" id="fs-done" onchange="renderTasks()"> Completed</label>
        </div>
      </div>
      <div class="form-field">
        <label>Job</label>
        <select id="f-job" onchange="renderTasks()">
          <option value="">All jobs</option>
        </select>
      </div>
      <div class="form-field">
        <label>Contact</label>
        <select id="f-contact" onchange="renderTasks()">
          <option value="">All contacts</option>
        </select>
      </div>
      <div class="form-field">
        <label>Trade</label>
        <select id="f-trade" onchange="renderTasks()">
          <option value="">All trades</option>
        </select>
      </div>
      <div class="form-field">
        <label>Due date</label>
        <input type="date" id="f-due" onchange="renderTasks()">
      </div>
      <div class="form-field">
        <label>Date added</label>
        <input type="date" id="f-added" onchange="renderTasks()">
      </div>
      <div class="form-field">
        <label>Sort by</label>
        <select id="f-sort" onchange="renderTasks()">
          <option value="added">Date added</option>
          <option value="due">Due date</option>
          <option value="job">Job</option>
          <option value="contact">Contact</option>
          <option value="trade">Trade</option>
        </select>
      </div>
      <div class="form-field">
        <label>Order</label>
        <select id="f-order" onchange="renderTasks()">
          <option value="desc">Newest / Z–A</option>
          <option value="asc">Oldest / A–Z</option>
        </select>
      </div>
      <button class="btn-clear" onclick="clearFilters()">Clear filters</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Tasks</div>
    <table class="tasks-table">
      <thead>
        <tr>
          <th>Status</th>
          <th>Task</th>
          <th>Job</th>
          <th>Contact</th>
          <th>Trade</th>
          <th>Due</th>
          <th>Added</th>
          <th>Completed</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tasks-body"></tbody>
    </table>
    <div class="empty-state" id="tasks-empty" style="display:none">No tasks match your filters.</div>
  </div>
</div>

<!-- TRADES PAGE -->
<div class="page" id="page-trades">
  <div class="trade-list-wrap" id="trades-panel"></div>
</div>

<!-- CONTACTS PAGE -->
<div class="page" id="page-contacts">
  <div class="card">
    <div class="card-title">Add Contact</div>
    <div class="contacts-add-form">
      <div class="form-field"><label>Name</label><input type="text" id="c-name" placeholder="Full name"></div>
      <div class="form-field"><label>Role / Type</label>
        <input list="role-list" id="c-role" placeholder="Designer, Client..." autocomplete="off">
        <datalist id="role-list"></datalist>
      </div>
      <div class="form-field"><label>Phone / Email</label><input type="text" id="c-detail" placeholder="Optional"></div>
      <button class="btn-sm" onclick="addContact()">+ Add Contact</button>
    </div>
  </div>
  <div class="contacts-grid" id="contacts-grid"></div>
</div>

const PRESET_TRADES = [
  'Foundation','Framing','Steel','Roof','Windows',
  'Exterior Doors and Hardware','Siding','Masonry',
  'Decking and Railings','Landscaping','Plumbing','Electrical',
  'Fireplace','AV','HVAC','Insulation','Drywall','Plaster','Stair','Trim'
];

// ─── STATE ───────────────────────────────────────────────────────────────────

let pendingJobs = [];

function load(key, def) {
  try { return JSON.parse(localStorage.getItem(key)) ?? def; } catch { return def; }
}
function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

let tasks    = load('fs_tasks', []);
let contacts = load('fs_contacts', null);
if (!contacts) { contacts = PRESET_CONTACTS; save('fs_contacts', contacts); }
let tradeTasks = load('fs_trade_tasks', {});
let trades = load('fs_trades', PRESET_TRADES);

// ─── INIT ─────────────────────────────────────────────────────────────────────

function init() {
  // migrate old tasks
  tasks = tasks.map(t => {
    if (!('status' in t)) {
      t.status = t.done ? 'completed' : 'open';
      t.startedAt  = null;
      t.completedAt = t.completed || null;
      delete t.done; delete t.completed;
    }
    if (!('jobs' in t)) {
      t.jobs = t.job ? [t.job] : [];
      delete t.job;
    }
    return t;
  });
  save('fs_tasks', tasks);

  populateJobDatalist();
  populateContactDatalist();
  populateTradeDatalist();
  populateJobFilter();
  populateContactFilter();
  populateTradeFilter();
  populateRoleDatalist();
  renderTasks();
  renderContacts();
  renderTradeList();

  ['tf-job','tf-task','tf-contact','tf-trade','tf-due'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => { if(e.key==='Enter') addTask(); });
  });
}

function populateJobDatalist() {
  const dl = document.getElementById('job-list');
  dl.innerHTML = PRESET_JOBS.map(j => `<option value="${j.label}">`).join('');
}

function populateContactDatalist() {
  const dl = document.getElementById('contact-list');
  dl.innerHTML = contacts.map(c => `<option value="${c.name}">`).join('');
}

function populateTradeDatalist() {
  const dl = document.getElementById('trade-list');
  dl.innerHTML = trades.map(t => `<option value="${t}">`).join('');
}

function populateTradeFilter() {
  const sel = document.getElementById('f-trade');
  const cur = sel.value;
  sel.innerHTML = '<option value="">All trades</option>' +
    trades.map(t => `<option value="${t}">${t}</option>`).join('');
  sel.value = cur;
}

function ensureTrade(name) {
  if (!name || trades.includes(name)) return;
  trades.push(name);
  save('fs_trades', trades);
  populateTradeDatalist();
  populateTradeFilter();
  renderTradeList();
}

function addTrade(name) {
  name = name.trim();
  if (!name || trades.includes(name)) return;
  trades.push(name);
  save('fs_trades', trades);
  populateTradeDatalist();
  populateTradeFilter();
  renderTradeList();
}

function removeTrade(name) {
  trades = trades.filter(t => t !== name);
  save('fs_trades', trades);
  populateTradeDatalist();
  populateTradeFilter();
  renderTradeList();
}

function populateRoleDatalist() {
  const roles = [...new Set(['Designer','Client','Vendor','Project Manager','Contractor','Other',
    ...contacts.map(c => c.role)])].filter(Boolean);
  document.getElementById('role-list').innerHTML = roles.map(r => `<option value="${r}">`).join('');
}

function populateJobFilter() {
  const sel = document.getElementById('f-job');
  const cur = sel.value;
  sel.innerHTML = '<option value="">All jobs</option>' +
    PRESET_JOBS.map(j => `<option value="${j.label}">${j.label}</option>`).join('');
  sel.value = cur;
}

function populateContactFilter() {
  const sel = document.getElementById('f-contact');
  const cur = sel.value;
  sel.innerHTML = '<option value="">All contacts</option>' +
    contacts.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
  sel.value = cur;
}

function populateTradeJobSelect() {
  const sel = document.getElementById('trade-job-sel');
  const cur = sel.value;
  sel.innerHTML = '<option value="">— Select job —</option>' +
    PRESET_JOBS.map(j => `<option value="${j.id}">${j.label}</option>`).join('');
  if (cur) sel.value = cur;
}

// ─── TASKS ────────────────────────────────────────────────────────────────────

// ─── JOB TAGS (form) ────────────────────────────────────────────────────────

function addJobTag() {
  const inp = document.getElementById('tf-job');
  const val = inp.value.trim().replace(/,$/, ''); // strip trailing comma
  if (!val) return;
  // match by short ID first, then full label
  const match = PRESET_JOBS.find(j =>
    j.id.toLowerCase() === val.toLowerCase() ||
    j.label.toLowerCase() === val.toLowerCase()
  );
  const label = match ? match.label : val;
  if (!pendingJobs.includes(label)) {
    pendingJobs.push(label);
    renderJobTagsForm();
  }
  inp.value = '';
}

function handleJobKeydown(e) {
  if (e.key === ',' || e.key === 'Enter') {
    e.preventDefault();
    e.stopPropagation();
    addJobTag();
  }
}

function removeJobTag(label) {
  pendingJobs = pendingJobs.filter(j => j !== label);
  renderJobTagsForm();
}

function renderJobTagsForm() {
  const wrap = document.getElementById('job-tags-form');
  wrap.innerHTML = pendingJobs.map(label => {
    const jobObj  = PRESET_JOBS.find(j => j.label === label);
    const isEmber = jobObj?.street === 'Ember';
    const display = jobObj ? jobObj.id : label;
    return `<span class="job-tag ${isEmber ? 'ember' : ''}">${esc(display)}<button class="job-tag-x" onclick="removeJobTag('${esc(label)}')" title="Remove">×</button></span>`;
  }).join('');
}

// ─── STATUS DROPDOWN ────────────────────────────────────────────────────────

function toggleStatusPanel(e) {
  e.stopPropagation();
  const panel = document.getElementById('status-panel');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
}

function updateStatusLabel() {
  const names = [];
  if (document.getElementById('fs-open').checked)   names.push('Open');
  if (document.getElementById('fs-inprog').checked) names.push('In Progress');
  if (document.getElementById('fs-done').checked)   names.push('Completed');
  document.getElementById('status-label').textContent =
    names.length === 0 ? 'None' : names.length === 3 ? 'All' : names.join(', ');
}

document.addEventListener('click', () => {
  const panel = document.getElementById('status-panel');
  if (panel) panel.style.display = 'none';
});

// ─── TASKS ───────────────────────────────────────────────────────────────────

function addTask() {
  const task    = document.getElementById('tf-task').value.trim();
  const contact = document.getElementById('tf-contact').value.trim();
  const trade   = document.getElementById('tf-trade').value.trim();
  const due     = document.getElementById('tf-due').value;

  // also grab whatever is typed in job field that hasn't been tagged yet
  const jobInp = document.getElementById('tf-job').value.trim();
  if (jobInp && !pendingJobs.includes(jobInp)) pendingJobs.push(jobInp);

  if (!task && !pendingJobs.length && !contact && !trade && !due) return;

  if (trade) ensureTrade(trade);
  tasks.unshift({ id: Date.now(), jobs: [...pendingJobs], task, contact, trade, due,
    status: 'open', startedAt: null, completedAt: null,
    added: new Date().toISOString() });
  save('fs_tasks', tasks);

  pendingJobs = [];
  document.getElementById('job-tags-form').innerHTML = '';
  ['tf-job','tf-task','tf-contact','tf-trade','tf-due'].forEach(id => {
    document.getElementById(id).value = '';
  });
  renderTasks();
}

function cycleStatus(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  const now = new Date().toISOString();
  if (t.status === 'open') {
    t.status = 'in-progress';
    t.startedAt = now;
    t.completedAt = null;
  } else if (t.status === 'in-progress') {
    t.status = 'completed';
    t.completedAt = now;
  } else {
    t.status = 'open';
    t.startedAt = null;
    t.completedAt = null;
  }
  save('fs_tasks', tasks);
  renderTasks();
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  save('fs_tasks', tasks);
  renderTasks();
}

function statusBadge(t) {
  if (t.status === 'completed')  return `<span onclick="cycleStatus(${t.id})" title="Click to cycle status" style="cursor:pointer;display:inline-flex;align-items:center;gap:4px;background:#e8f5e9;color:#2e7d32;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700">✓ Done</span>`;
  if (t.status === 'in-progress') return `<span onclick="cycleStatus(${t.id})" title="Click to cycle status" style="cursor:pointer;display:inline-flex;align-items:center;gap:4px;background:#fff3e0;color:#e65100;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700">▶ In Progress</span>`;
  return `<span onclick="cycleStatus(${t.id})" title="Click to cycle status" style="cursor:pointer;display:inline-flex;align-items:center;gap:4px;background:#f0f2f5;color:#888;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700">○ Open</span>`;
}

function daysTracked(t) {
  if (!t.startedAt) return '<span style="color:#ccc">—</span>';
  const end = t.completedAt ? new Date(t.completedAt) : new Date();
  const days = Math.ceil((end - new Date(t.startedAt)) / 86400000);
  const label = t.completedAt ? `${days}d` : `${days}d ongoing`;
  const color = t.completedAt ? '#2e7d32' : '#e65100';
  return `<span style="font-size:12px;font-weight:600;color:${color}">${label}</span>`;
}

function renderTasks() {
  const showOpen  = document.getElementById('fs-open').checked;
  const showInProg= document.getElementById('fs-inprog').checked;
  const showDone  = document.getElementById('fs-done').checked;
  const jobF     = document.getElementById('f-job').value;
  const contactF = document.getElementById('f-contact').value;
  const tradeF   = document.getElementById('f-trade').value;
  const dueF     = document.getElementById('f-due').value;
  const addedF   = document.getElementById('f-added').value;
  const sortBy   = document.getElementById('f-sort').value;
  const order    = document.getElementById('f-order').value;

  let list = tasks.filter(t => {
    if (t.status === 'open'        && !showOpen)   return false;
    if (t.status === 'in-progress' && !showInProg) return false;
    if (t.status === 'completed'   && !showDone)   return false;
    if (jobF     && !(t.jobs||[]).includes(jobF))  return false;
    if (contactF && t.contact !== contactF)         return false;
    if (tradeF   && t.trade   !== tradeF)           return false;
    if (dueF     && t.due     !== dueF)             return false;
    if (addedF   && !t.added.startsWith(addedF))    return false;
    return true;
  });

  list.sort((a, b) => {
    let va, vb;
    if      (sortBy === 'added') { va = a.added;      vb = b.added; }
    else if (sortBy === 'due')   { va = a.due||'';    vb = b.due||''; }
    else if (sortBy === 'job')   { va = a.job||'';    vb = b.job||''; }
    else if (sortBy === 'trade') { va = a.trade||'';  vb = b.trade||''; }
    else                         { va = a.contact||''; vb = b.contact||''; }
    return order === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
  });

  const today = new Date().toISOString().slice(0,10);
  document.getElementById('tasks-body').innerHTML = list.map(t => {
    const jobs     = t.jobs || [];
    const jobBadges = jobs.length
      ? jobs.map(label => {
          const obj = PRESET_JOBS.find(j => j.label === label);
          return `<span class="job-badge ${obj?.street==='Ember'?'ember':''}" style="margin:1px 2px">${esc(obj ? obj.id : label)}</span>`;
        }).join('')
      : '<span style="color:#ccc">—</span>';
    const overdue  = t.due && t.due < today && t.status !== 'completed' ? 'overdue' : '';
    const rowClass = t.status === 'completed' ? 'completed' : '';
    return `<tr class="${rowClass}">
      <td>${statusBadge(t)}</td>
      <td>${esc(t.task)}</td>
      <td>${jobBadges}</td>
      <td>${esc(t.contact) || '<span style="color:#ccc">—</span>'}</td>
      <td>${t.trade ? `<span style="font-size:12px;background:#f0f7ee;color:#2d6a4f;border-radius:10px;padding:2px 9px;font-weight:600">${esc(t.trade)}</span>` : '<span style="color:#ccc">—</span>'}</td>
      <td class="col-due ${overdue}">${t.due ? fmtDate(t.due) : '<span style="color:#ccc">—</span>'}</td>
      <td class="col-added">${fmtDateTime(t.added)}</td>
      <td class="col-completed">
        ${t.completedAt ? fmtDateTime(t.completedAt) : '<span style="color:#ccc">—</span>'}
        <div style="margin-top:2px">${daysTracked(t)}</div>
      </td>
      <td><button class="btn-delete" onclick="deleteTask(${t.id})" title="Delete">×</button></td>
    </tr>`;
  }).join('');

  document.getElementById('tasks-empty').style.display = list.length ? 'none' : 'block';
}

function clearFilters() {
  document.getElementById('fs-open').checked   = true;
  document.getElementById('fs-inprog').checked = true;
  document.getElementById('fs-done').checked   = false;
  updateStatusLabel();
  document.getElementById('f-job').value     = '';
  document.getElementById('f-contact').value = '';
  document.getElementById('f-trade').value   = '';
  document.getElementById('f-due').value     = '';
  document.getElementById('f-added').value   = '';
  document.getElementById('f-sort').value    = 'added';
  document.getElementById('f-order').value   = 'desc';
  renderTasks();
}

// ─── TRADES LIST ──────────────────────────────────────────────────────────────

function renderTradeList() {
  const wrap = document.getElementById('trades-panel');
  const tiles = trades.map(trade => `
    <div style="background:#fff;border-radius:8px;padding:10px 16px;box-shadow:0 1px 4px rgba(0,0,0,.07);display:flex;align-items:center;gap:10px;">
      <span style="font-size:14px;font-weight:600;color:#e87c2f;flex:1">${esc(trade)}</span>
      <button onclick="removeTrade('${esc(trade)}')" style="background:none;border:none;color:#ccc;font-size:16px;cursor:pointer;line-height:1;padding:0" title="Remove">×</button>
    </div>`).join('');

  wrap.innerHTML = `
    <div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px">${tiles}</div>
    <div style="display:flex;gap:8px;max-width:340px">
      <input id="new-trade-input" class="trade-add-input" placeholder="Add new trade…"
        onkeydown="if(event.key==='Enter'){addTrade(this.value);this.value=''}">
      <button class="trade-add-btn" onclick="const i=document.getElementById('new-trade-input');addTrade(i.value);i.value=''">Add</button>
    </div>`;
}

// ─── CONTACTS ─────────────────────────────────────────────────────────────────

function addContact() {
  const name   = document.getElementById('c-name').value.trim();
  const role   = document.getElementById('c-role').value.trim() || 'Other';
  const detail = document.getElementById('c-detail').value.trim();
  if (!name) return;
  contacts.push({ id: 'c_' + Date.now(), name, role, detail });
  save('fs_contacts', contacts);
  document.getElementById('c-name').value = '';
  document.getElementById('c-role').value = '';
  document.getElementById('c-detail').value = '';
  populateContactDatalist();
  populateContactFilter();
  populateRoleDatalist();
  renderContacts();
}

function deleteContact(id) {
  contacts = contacts.filter(c => c.id !== id);
  save('fs_contacts', contacts);
  populateContactDatalist();
  populateContactFilter();
  renderContacts();
}

function renderContacts() {
  const grid = document.getElementById('contacts-grid');

  // Group by role, preserving a preferred order for known roles
  const ORDER = ['designer','client','vendor','project manager','contractor'];
  const byRole = {};
  contacts.forEach(c => {
    const key = (c.role || 'other').toLowerCase();
    (byRole[key] = byRole[key] || []).push(c);
  });

  const roleKeys = Object.keys(byRole).sort((a, b) => {
    const ai = ORDER.indexOf(a), bi = ORDER.indexOf(b);
    if (ai !== -1 && bi !== -1) return ai - bi;
    if (ai !== -1) return -1;
    if (bi !== -1) return 1;
    return a.localeCompare(b);
  });

  const tagColor = role => {
    const r = role.toLowerCase();
    if (r === 'designer')        return 'background:#e8f0fe;color:#3b5998';
    if (r === 'client')          return 'background:#fce8e8;color:#c0392b';
    if (r === 'vendor')          return 'background:#e6f9f0;color:#1a7a4a';
    if (r === 'project manager') return 'background:#fef9e7;color:#7d6608';
    if (r === 'contractor')      return 'background:#f4ecf7;color:#6c3483';
    return 'background:#f0f2f5;color:#555';
  };

  grid.innerHTML = roleKeys.map(role => {
    const list = byRole[role];
    const title = role.replace(/\b\w/g, l => l.toUpperCase());
    return `<div style="grid-column:1/-1;font-size:11px;font-weight:700;letter-spacing:1.2px;color:#aaa;text-transform:uppercase;padding-top:8px">${title}s</div>
    ${list.map(c => `
    <div class="contact-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
        <div class="contact-name">${esc(c.name)}</div>
        <span style="display:inline-block;border-radius:10px;padding:2px 9px;font-size:11px;white-space:nowrap;${tagColor(c.role)}">${esc(c.role)}</span>
      </div>
      ${c.detail ? `<div class="contact-detail">${esc(c.detail)}</div>` : ''}
      <div class="contact-actions">
        <button class="btn-sm danger" style="padding:4px 10px;font-size:12px" onclick="deleteContact('${c.id}')">Remove</button>
      </div>
    </div>`).join('')}`;
  }).join('');
}

// ─── NAV ─────────────────────────────────────────────────────────────────────

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  event.currentTarget.classList.add('active');
}

// ─── UTILS ────────────────────────────────────────────────────────────────────

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function fmtDate(iso) {
  const [y,m,d] = iso.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[+m-1]} ${+d}, ${y}`;
}

function fmtDateTime(iso) {
  const d = new Date(iso);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let h = d.getHours(), ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  const min = String(d.getMinutes()).padStart(2,'0');
  return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()} ${h}:${min} ${ampm}`;
}

init();
